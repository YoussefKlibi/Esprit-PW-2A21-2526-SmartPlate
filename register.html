<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPlate - Inscription</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Views/css/Template.css">
    <link rel="stylesheet" href="../Views/css/register.css">

    

    
</head>
<body>

    <div class="login-wrapper">
        <div class="login-left">
            <a href="login.html" class="brand">
                <div class="logo-icon-login">SP</div>
                <span class="brand-name">SmartPlate</span>
            </a>

            <h1>Rejoignez-nous ! 🚀</h1>
            <p>Créez votre compte en quelques secondes.</p>

            <form action="Objectif.html" method="GET" class="modern-form">
                
                <div class="name-row">
                    <div class="form-group">
                        <label for="prenom">Prénom</label>
                        <input type="text" id="prenom" class="form-control" placeholder="Jean" required>
                    </div>
                    <div class="form-group">
                        <label for="nom">Nom</label>
                        <input type="text" id="nom" class="form-control" placeholder="Dupont" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Adresse mail</label>
                    <input type="email" id="email" class="form-control" placeholder="exemple@mail.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">Confirmer le mot de passe</label>
                    <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-main">Créer mon compte</button>
                
                <button type="button" class="btn-secondary" style="width: 100%; border-radius: 14px; padding: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 1rem;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" width="20">
                    S'inscrire avec Google
                </button>
            </form>

            <p class="create-acc">Vous avez déjà un compte ? <a href="login.html">Se connecter</a></p>
        </div>
        
        <div class="login-right">
            <h2>Votre parcours<br>commence ici</h2>
            <p>Définissez vos objectifs, suivez vos repas en détail et progressez à votre rythme grâce à notre accompagnement intelligent.</p>
        </div>
    </div>

</body>
</html>
